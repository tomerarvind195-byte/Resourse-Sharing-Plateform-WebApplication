<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Changed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #42abbc, #2b6b70);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .success-card {
            background: #ffffff;
            padding: 40px 35px;
            max-width: 420px;
            width: 100%;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease-in-out;
        }

        .success-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        h2 {
            color: #2b6b70;
            margin-bottom: 20px;
        }

        p {
            color: #555;
            font-size: 15px;
            margin-bottom: 30px;
        }

        a {
            display: inline-block;
            text-decoration: none;
            background: #42abbc;
            color: white;
            padding: 12px 26px;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }

        a:hover {
            background: #2b6b70;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="success-card">
    <div class="success-icon">✅</div>
    <h2>Password Changed Successfully!</h2>
    <p>Your password has been updated. Please keep it secure.</p>
    <a href="/">Go to Home</a>
</div>

</body>
</html>
