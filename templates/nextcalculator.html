<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trending Books | Book Rental</title>
  <style>
     body {
      font-family: Arial, sans-serif;
      background-color: #42abbc;
      margin: 0;
      padding: 0;
    }

    /* Header */
    header {
      position: relative;
      background-color: #0a012d;
      color: white;
      text-align: center;
      padding: 20px;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    /* Top-right Search link */
    header a.search-link {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      background-color: #e94e3c;
      padding: 8px 15px;
      border-radius: 20px;
      transition: background 0.3s, transform 0.2s;
    }

    header a.search-link:hover {
      background-color: #b6d130;
      transform: scale(1.05);
    }

    /* Top-left Home link */
    header a.home-link {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      background-color: #3885e9;
      padding: 8px 15px;
      border-radius: 20px;
      transition: background 0.3s, transform 0.2s;
    }

    header a.home-link:hover {
      background-color: #0c47a1;
      transform: scale(1.05);
    }

    /* Book Container */
    .container {
      padding: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 40px;
      max-width: 1200px;
      margin: 40px auto;
      min-height: 80vh;
    }

    /* Book Card */
    .book {
      background-color: white;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
      text-align: center;
      padding: 20px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      width: 100%;
      height: 450px; /* uniform height for all cards */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .book:hover {
      transform: translateY(-8px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    }

    .book img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 10px;
    }

    .book h3 {
      margin: 15px 0;
      font-size: 20px;
      color: #333;
      flex-grow: 1;
    }

    .rent-btn {
      background: linear-gradient(90deg, #e94e3c, #f5a623);
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s, background 0.3s;
    }

    .rent-btn:hover {
      transform: scale(1.05);
      background: linear-gradient(90deg, #f5a623, #b6d130);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 15px;
      background-color: #eee;
      color: #444;
      margin-top: 40px;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 22px;
      }
      .container {
        padding: 20px;
      }
      .book {
        height: auto;
      }
      header a.home-link,
      header a.search-link {
        padding: 6px 12px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <header>
    {% load static %}
    <a href="{% url 'home' %}" class="home-link">Home</a>
    <h1>calculater</h1>
    <a href="{% url 'search' %}" class="search-link">Search</a>
  </header>

  <div class="container">
    <div class="book">
      {% load static %}
      <img src="{% static 'images/casio fx 9860g.jpg' %}" alt="casio fx 991 ms">
      <h3>Casio fx 9860g </h3>
      <button class="rent-btn" onclick="window.location.href='{% url 'casiofx9960g' %}'">Explore</button>
    </div>

    <div class="book">
      <img src="{% static 'images/fx 991 es.jpg' %}" alt="Math Book">
      <h3>casio fx 991 es</h3>
      <button class="rent-btn" onclick="window.location.href='{% url 'casiofx991es' %}'">Explore</button>
    </div>

    <div class="book">
      <img src="{% static 'images/fx 991ms.jpg' %}" alt="Programming Book">
      <h3> casio fx 991 ms</h3>
      <button class="rent-btn" onclick="window.location.href='{% url 'casiofx991ms' %}'">Explore</button>
    </div>

    <div class="book">
      <img src="{% static 'images/simple calc.jpg' %}" alt="Data Structures Book">
      <h3>simple calculater</h3>
      <button class="rent-btn" onclick="window.location.href='{% url 'simplecalculater' %}'">Explore</button>
    </div>
  </div>

  <footer>
    © 2025 Resources Platform | Designed by You for Helping Other Students
  </footer>

</body>
</html>
