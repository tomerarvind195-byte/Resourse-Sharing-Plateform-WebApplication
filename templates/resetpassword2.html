<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resend OTP | Resource Sharing Platform</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #007185, #00bfa6);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .otp-container {
      background: #fff;
      padding: 2rem 3rem;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    h1 {
      color: #007185;
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      margin-bottom: 20px;
    }

    .otp-input {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .otp-input input {
      width: 45px;
      height: 50px;
      text-align: center;
      font-size: 1.5rem;
      border: 2px solid #007185;
      border-radius: 8px;
      outline: none;
      transition: 0.2s;
    }

    .otp-input input:focus {
      border-color: #00bfa6;
      box-shadow: 0 0 5px rgba(0, 191, 166, 0.5);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background-color: #007185;
      color: #fff;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #005f6b;
    }

    .resend-section {
      margin-top: 15px;
      color: #333;
    }

    .resend-btn {
      background: none;
      border: none;
      color: #007185;
      font-weight: bold;
      cursor: pointer;
      text-decoration: underline;
    }

    .resend-btn:disabled {
      color: #999;
      cursor: not-allowed;
      text-decoration: none;
    }

    footer {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #777;
    }

    a {
      color: #007185;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="otp-container">
    <h1>Resource Sharing Platform</h1>
    <p>Please enter the OTP sent to your registered email/phone.</p>

    <div class="otp-input">
      <input type="text" maxlength="1" />
      <input type="text" maxlength="1" />
      <input type="text" maxlength="1" />
      <input type="text" maxlength="1" />
    </div>

               {% load static %}
         <form method="post">
    {% csrf_token %}
    <input type="text" name="otp" placeholder="Enter OTP" required>
    <button type="submit">Verify OTP</button>
</form>
     

    <div class="resend-section">
      <p id="timer-text">Resend OTP in <span id="countdown">30</span>s</p>
      <button id="resendBtn" class="resend-btn" disabled>Resend OTP</button>
    </div>

    <footer>
      <p><a href="{% url 'home' %}">← Back to Home</a></p>
    </footer>
  </div>

  <script>
    // Timer for resend button
    let countdown = 30;
    const countdownEl = document.getElementById("countdown");
    const resendBtn = document.getElementById("resendBtn");
    const timerText = document.getElementById("timer-text");

    const timer = setInterval(() => {
      countdown--;
      countdownEl.textContent = countdown;

      if (countdown <= 0) {
        clearInterval(timer);
        resendBtn.disabled = false;
        timerText.textContent = "Didn't get the code?";
      }
    }, 1000);

    // Resend OTP click event
    resendBtn.addEventListener("click", () => {
      resendBtn.disabled = true;
      countdown = 30;
      countdownEl.textContent = countdown;
      timerText.innerHTML = `Resend OTP in <span id="countdown">30</span>s`;
      startTimer();
      alert("OTP has been resent successfully!");
    });

    function startTimer() {
      let newTimer = setInterval(() => {
        countdown--;
        document.getElementById("countdown").textContent = countdown;
        if (countdown <= 0) {
          clearInterval(newTimer);
          resendBtn.disabled = false;
          timerText.textContent = "Didn't get the code?";
        }
      }, 1000);
    }
  </script>
</body>
</html>
