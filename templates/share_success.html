<!DOCTYPE html>
<html>
<head>
    <title>Item Shared</title>
    <style>
        body {
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#42abbc,#2b6b70);
            font-family:Arial;
        }
        .box {
            background:white;
            padding:40px;
            border-radius:15px;
            text-align:center;
        }
        a {
            display:inline-block;
            margin-top:20px;
            background:#42abbc;
            color:white;
            padding:12px 25px;
            text-decoration:none;
            border-radius:8px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>✅ Item Shared Successfully</h1>
        <p>Thank you for helping the community!</p>
        <a href="{% url 'shareitem' %}">Share Another Item</a>
    </div>
</body>
</html>
