<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #42abbc, #2b6b70);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .card {
            background: #fff;
            padding: 35px 30px;
            width: 100%;
            max-width: 420px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #2b6b70;
        }

        form p {
            margin-bottom: 18px;
        }

        form label {
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
        }

        form input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        form input:focus {
            outline: none;
            border-color: #42abbc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #42abbc;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #2b6b70;
        }

        .helptext {
            font-size: 12px;
            color: #666;
        }

        ul {
            padding-left: 18px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Change Password</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Change Password</button>
    </form>
</div>

</body>
</html>
