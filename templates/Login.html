<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Resource Sharing Platform</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #007BFF;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 320px;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .login-btn {
      background-color: #f7a500;
      border: none;
      color: white;
      padding: 10px;
      width: 100%;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    .links {
      margin-top: 15px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }

    .links a {
      text-decoration: none;
      color: #007BFF;
    }

    .back-btn {
      display: block;
      margin-top: 20px;
      background-color: #ff7f00;
      color: white;
      padding: 8px;
      text-decoration: none;
      border-radius: 6px;
    }

    .error {
      color: red;
      font-size: 14px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="login-box">

    <h2>Login</h2>

    {% if messages %}
      {% for message in messages %}
        <p class="error">{{ message }}</p>
      {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'Login' %}">
      {% csrf_token %}

      <input type="text" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>

      <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="links">
      <a href="{% url 'register' %}">Create account</a>
      <a href="{% url 'Resetpassword' %}">Forgot password?</a>
    </div>

    <a href="{% url 'home' %}" class="back-btn">Back to Home</a>

  </div>

</body>
</html>
