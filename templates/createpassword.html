<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Authentication - AKTU ERP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #87CEEB;
            margin: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-top: 5px solid #4000a0; /* Mimics the red line */
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            color: #000000;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .section-header {
            background-color: #FFF000;
            color: white;
            padding: 10px 15px;
            font-size: 1.1em;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #333;
        }
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 1em;
        }
        button {
            background-color: #FFF000; /* Red button to match theme */
            color: white;
            padding: 12px 20px;
            border: none;
            cursor: pointer;
            font-size: 1.1em;
            margin-top: 15px;
        }
        button:hover {
            background-color: #880000;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Reset Password</h2>

    <div class="section-header">
        Change Authentication 
    </div>

   <form method="post">
    {% csrf_token %}

    <input type="password" name="new-password" placeholder="New Password" required>
    <input type="password" name="confirm-password" placeholder="Confirm Password" required>

    <button type="submit">CHANGE PASSWORD</button>
</form>

</div>

</body>
  </html>
