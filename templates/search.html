  <style>
    body {
      margin: 0;
      font-family: Poppins, sans-serif;
      background: #f5f7fa;
      color: #333;
    }

    nav {
      background: #1a73e8;
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      flex-wrap: wrap;
    }

    .logo {
      font-weight: 600;
      font-size: 20px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 16px;
      margin: 0;
      padding: 0;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
    }

    .search-section {
      text-align: center;
      padding: 48px 16px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    input[type="text"] {
      flex: 1;
      min-width: 220px;
      padding: 10px 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
    }

    select {
      padding: 10px 12px;
      border-radius: 8px;
      border: 2px solid #ddd;
      font-size: 15px;
    }

    button {
      background: #1a73e8;
      color: #fff;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .results {
      max-width: 720px;
      margin: 28px auto 80px;
      padding: 0 16px;
    }

    .result-item {
      background: #fff;
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: 0.2s;
    }

    .result-item:hover {
      transform: translateY(-2px);
      background: #f0f4ff;
    }

    footer {
      text-align: center;
      padding: 18px;
      color: #666;
      border-top: 1px solid #eee;
      background: #fafafa;
    }
  </style>
</head>

<body>

<nav>

</section>

  form.addEventListener('submit', function (e) {
    e.preventDefault();

    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    const category = document.getElementById('categorySelect').value;

    resultsContainer.innerHTML = '';

    if (!query) {
      resultsContainer.innerHTML = '<p>Please enter a search term.</p>';
      return;
    }

    const filtered = resources.filter(function (item) {
      const matchCategory = category === 'all' || item.type === category;
      const matchQuery = item.title.toLowerCase().includes(query);
      return matchCategory && matchQuery;
    });

    if (filtered.length === 0) {
      resultsContainer.innerHTML = '<p>No results found.</p>';
      return;
    }

    filtered.forEach(function (item) {
      const div = document.createElement('div');
      div.className = 'result-item';
      div.textContent = item.title + " (" + item.type + ")";

      div.addEventListener('click', function () {
        window.location.href = item.url;
      });

      resultsContainer.appendChild(div);
    });
  });
